<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Karan Jain | Digital Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #002366; --gold: #C5B358; }
        body { background-color: #f4f7f6; font-family: 'Open Sans', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .vcard { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .vcard-header { background: var(--navy); padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .vcard-body { padding: 30px 20px; text-align: center; }
        .firm-name { font-family: 'Montserrat'; color: var(--navy); font-size: 1.4rem; margin-bottom: 5px; }
        .ca-tag { font-size: 0.9rem; color: #666; margin-bottom: 25px; display: block; }
        .action-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; text-decoration: none; color: var(--navy); font-weight: 600; transition: 0.3s; }
        .action-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
        .action-btn img { margin-right: 15px; }
        .save-btn { background: var(--gold); color: white !important; border: none; justify-content: center; margin-top: 10px; box-shadow: 0 4px 15px rgba(197, 179, 88, 0.4); }
    </style>
</head>
<body>
    <div class="vcard">
        <div class="vcard-header">
            <img src="logo.png" alt="CA India" style="height: 70px; width: auto;">
        </div>
        <div class="vcard-body">
            <h2 class="firm-name">CA. Karan Jain</h2>
            <span class="ca-tag">Fellow Member of ICAI | DHANANI & JAIN</span>

            <div class="actions">
                <a href="tel:+919687167883" class="action-btn">
                    <span>📞 Call Now</span>
                </a>
                <a href="https://wa.me/919687167883" class="action-btn">
                    <span>💬 WhatsApp Chat</span>
                </a>
                <a href="mailto:info@djca.in" class="action-btn">
                    <span>📧 Send Email</span>
                </a>
                <a href="https://djca.in" class="action-btn">
                    <span>🌐 Visit Website</span>
                </a>
                <a href="karan-jain.vcf" class="action-btn save-btn">
                    DOWNLOAD CONTACT
                </a>
            </div>
            
            <p class="small text-muted mt-4">Trade House, Surat | Mulund, Mumbai</p>
        </div>
    </div>
</body>
</html>
